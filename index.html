<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Count Characters</title>
    <meta
      name="description"
      content="Pin Count Characters and open it from the toolbar to get character, word, and no-space counts in one click."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <a class="brand" href="./">
          <img src="assets/count-characters.png" alt="Count Characters logo" />
          <span>Count Characters</span>
        </a>
        <nav aria-label="Main navigation">
          <a href="./">Home</a>
          <a href="mailto:support@example.com">Contact us</a>
        </nav>
      </header>

      <main>
        <a class="install-btn" href="https://chromewebstore.google.com/" target="_blank" rel="noreferrer"
          >Install the extension</a
        >

        <h1>Now you have a simple way to count characters on any page</h1>

        <ol class="steps">
          <li>
            <p>Pin the extension for quick access to Count Characters.</p>
            <div class="shot" aria-hidden="true">
              <div class="shot-top"></div>
              <div class="shot-row">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="line"></span>
                <span class="tile">Pin</span>
              </div>
            </div>
          </li>
          <li>
            <p>Click the extension icon to open the counter.</p>
            <div class="shot" aria-hidden="true">
              <div class="panel-head">
                <img src="assets/count-characters.png" alt="" />
                <strong>Count Characters</strong>
              </div>
              <div class="panel-box"></div>
              <div class="panel-stats">
                <span>Characters: 284</span>
                <span>Words: 46</span>
              </div>
            </div>
          </li>
        </ol>
      </main>
    </div>
  </body>
</html>
