<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Count Characters</title>
    <meta
      name="description"
      content="How to use Count Characters: pin the extension, open it from toolbar, and count text in one click."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top">
        <a class="brand" href="./">
          <img src="assets/count-characters.png" alt="Count Characters logo" />
          <span>Count Characters</span>
        </a>
        <nav aria-label="Main navigation">
          <a href="./">Home</a>
          <a href="mailto:support@example.com">Contact us</a>
        </nav>
      </header>

      <main>
        <a class="cta" href="https://chromewebstore.google.com/" target="_blank" rel="noreferrer">Install the extension</a>
        <h1>Now you have a great way to count characters</h1>

        <section class="step">
          <h2>1. Pin the extension for quick access to Count Characters.</h2>
          <div class="browser-shot" aria-hidden="true">
            <div class="browser-top">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
              <div class="tab">
                <img src="assets/count-characters.png" alt="" />
                <span>Count Characters</span>
              </div>
            </div>
            <div class="browser-toolbar">
              <div class="address"></div>
              <div class="ext-pill">
                <img src="assets/count-characters.png" alt="" />
                <span>Pin</span>
              </div>
            </div>
            <div class="browser-panel">
              <div class="panel-title">
                <img src="assets/count-characters.png" alt="" />
                <strong>Count Characters</strong>
              </div>
              <div class="panel-row"></div>
              <div class="panel-row short"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
