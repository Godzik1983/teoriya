<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Count Characters</title>
    <meta
      name="description"
      content="How to use Count Characters: pin the extension, open it from toolbar, and count text in one click."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top">
        <a class="brand" href="./">
          <img src="assets/count-characters.png" alt="Count Characters logo" />
          <span>Count Characters</span>
        </a>
        <nav aria-label="Main navigation">
          <a href="./">Home</a>
          <a href="mailto:support@example.com">Contact us</a>
        </nav>
      </header>

      <main>
        <a class="cta" href="https://chromewebstore.google.com/" target="_blank" rel="noreferrer">Install the extension</a>
        <h1>Now you have a great way to count characters</h1>

        <section class="step">
          <h2>1. Pin the extension for quick access to Count Characters.</h2>

          <div class="browser-shot" aria-hidden="true">
            <div class="chrome-top">
              <div class="omnibox"></div>
              <div class="toolbar-icon"></div>
              <div class="toolbar-icon active"></div>
            </div>

            <div class="chrome-body">
              <div class="extensions-card">
                <h3>Extensions</h3>
                <div class="ext-row">
                  <div class="ext-main">
                    <img src="assets/count-characters.png" alt="" />
                    <strong>Count Characters</strong>
                  </div>
                  <button type="button">Pin</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
