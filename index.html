<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Count Characters</title>
    <meta
      name="description"
      content="How to use Count Characters: pin the extension, open it from toolbar, and count text in one click."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="top">
        <a class="brand" href="./">
          <img src="assets/count-characters.png" alt="Count Characters logo" />
          <span>Count Characters</span>
        </a>
        <nav aria-label="Main navigation">
          <a href="./">Home</a>
          <a href="mailto:support@example.com">Contact us</a>
        </nav>
      </header>

      <main>
        <a class="cta" href="https://chromewebstore.google.com/" target="_blank" rel="noreferrer">Install the extension</a>
        <h1>How To Use Character Counter</h1>

        <section class="step">
          <h2>1. Open your extensions panel and pin Character counter</h2>
          <img src="assets/welcome-step-1.png" alt="Open extensions panel and pin Character counter" />
        </section>

        <section class="step">
          <h2>2. Click the app icon to open the app</h2>
          <img src="assets/welcome-step-2.png" alt="Click Character counter icon in browser toolbar" />
        </section>

        <section class="step">
          <h2>3. You can also count text from right-click menu</h2>
          <img src="assets/welcome-step-3.png" alt="Use Character counter from context menu" />
        </section>
      </main>
    </div>
  </body>
</html>
