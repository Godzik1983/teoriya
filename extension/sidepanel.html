<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Count Characters</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="sidepanel">
    <main class="app glass">
      <header class="topbar">
        <h1><img src="icons/64.png" alt="" class="title-icon" />Count Characters</h1>
        <div class="topbar-actions">
          <button id="pasteBtn" type="button">Paste</button>
          <button id="clearBtn" type="button" class="ghost">Clear</button>
        </div>
      </header>

      <div class="limits">
        <label>
          Character limit
          <input id="charLimit" type="number" min="0" placeholder="No limit" />
        </label>
        <label>
          Word limit
          <input id="wordLimit" type="number" min="0" placeholder="No limit" />
        </label>
      </div>

      <div id="editor" class="editor" contenteditable="true" spellcheck="false" data-placeholder="Paste or type text..."></div>

      <section class="stats">
        <p>Characters: <strong id="charsCount">0</strong></p>
        <p>No spaces: <strong id="charsNoSpaceCount">0</strong></p>
        <p>Words: <strong id="wordsCount">0</strong></p>
      </section>

      <section class="social-scale" aria-label="Social media limits scale">
        <div class="social-head">
          <h2>Social media limits</h2>
          <span id="socialCurrent">0</span>
        </div>
        <div class="social-icons">
          <div class="social-item" style="--pos: 46.88%">
            <span class="social-icon" aria-label="Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3H7Zm11 1.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"></path>
              </svg>
            </span>
            <span class="social-limit">150</span>
          </div>
          <div class="social-item" style="--pos: 78.13%"><span class="social-icon">f</span><span class="social-limit">250</span></div>
          <div class="social-item" style="--pos: 87.5%"><span class="social-icon">X</span><span class="social-limit">280</span></div>
          <div class="social-item" style="--pos: 93.75%"><span class="social-icon">in</span><span class="social-limit">300</span></div>
        </div>
        <div class="bar-wrap">
          <div id="socialTrack" class="social-track"></div>
          <div id="socialProgress" class="social-progress"></div>
          <div id="socialThumb" class="social-thumb"></div>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
